<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi primer script</title>
</head>
<body>

<!-- Primer ejercicio clase (Imprimir texto)-->

    <h1>Ejecución de Javascript desde consola</h1>
    <script>
        console.log("¡Hola, JavaScript!");
    </script>


<!-- Segundo ejercicio clase (nombrar variables) -->

    <script>
        let mascota = "Carlos";
        console.log("¡Hola, mi mascota se llama" + " " + mascota);
   
// Tercer ejercicio clase (nombrar variables) -->

        let nombre = prompt("¿Cual es tu nombre?");
        console.log("¡Hola, " + nombre + "!");
   
// TIPOS DE DATOS-->

        let number = 42;
        let boleano = true;
        let texto = "Hola";
        console.log("Número: " + number);
        console.log("Boleano: " + boleano);
        console.log("Texto: " + texto);

        let a = 5;
        let b = 10;

// Operaciones matemáticas

        var suma = a + b;
        var resta = a - b;
        var multiplicación = a * b;
        var división = a / b;
        console.log("Suma: " +  suma);
        console.log("Resta: " +  resta);
        console.log("multiplicación: " + multiplicación);
        console.log("división: " + división);

// Operaciones de comparación
        console.log("¿a es igual a b? " + (a===b));
        console.log("¿a es mayor a b? " + (a > b));
        console.log("¿a es menor a b? " + (a < b));

        if (null) {
            console.log("Este no se ejecuta por 0 es falso")
        } else {
            console.log("null es falso.")
        }

    </script>


</body>
</html>
