 <!-- EJERCICIO 3
    **Crea un programa que te pregunte tu edad y te diga cuántos años te faltan para cumplir 100.** */ -->

    <h1>Ejecución de Javascript desde consola reto 3</h1>
    <script>
        let edad = prompt("¿Cuántos años tienes?");
            edad = Number(edad);

        let faltan = 100 - edad;
            console.log("Te faltan " + faltan + " años para cumplir 100 ");
    </script>

 <!-- EJERCICIO Arreglos DEFV
    **Crea un array llamado colores con al menos cuatro colores diferentes.** */ -->

    <h1>Ejecución de Javascript desde consola reto defv arreglos</h1>
    <script>
        let colores = ['rojo', 'verde', 'azul', 'amarillo'];
            console.log(colores[1]); // Imprime: verde
            colores[2] = 'naranja'; // Cambia 'azul' a 'naranja'
            colores.push('violeta');
            colores.shift();
            console.log(colores); // Muestra el array modificado

    </script>
